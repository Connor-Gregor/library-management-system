<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Library Management System - Register</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-image: url('/static/images/Library_Background.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .page-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        width: 100%;
      }

      .page-title {
        color: white;
        margin: 0 0 20px 0;
        text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.6);
      }

      .register-container {
        background: white;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        width: 350px; /* Slightly wider than login to fit the inputs nicely */
        text-align: left;
      }

      .register-container h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 1.5rem;
      }

      /* Places First Name and Last Name side-by-side */
      .name-row {
        display: flex;
        gap: 10px;
      }

      .name-row div {
        flex: 1;
      }

      label {
        display: block;
        margin-bottom: 0.3rem;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 0.5rem;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 0.6rem;
        background-color: #007bff;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
      }

      button:hover {
        background-color: #0056b3;
      }

      .footer {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.85rem;
      }

      .footer a {
        color: #007bff;
        text-decoration: none;
      }

      .error-message {
        color: red;
        text-align: center;
        margin-bottom: 1rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <h1 class="page-title">Library Management System</h1>

      <div class="register-container">
        <h2>Register</h2>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}">
          <div class="name-row">
            <div>
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" name="first_name" required />
            </div>
            <div>
              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" name="last_name" required />
            </div>
          </div>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />

          <button type="submit">Sign Up</button>
        </form>

        <div class="footer">
          <p>
            Already have an account? <a href="{{ url_for('login') }}">Log In</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
