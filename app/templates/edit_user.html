<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit User Account</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-image: url('/static/images/Library_Background.jpg');
        background-size: cover;
        background-position: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px 0;
      }
      .form-container {
        background: white;
        padding: 2.5rem;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        width: 450px;
        max-width: 90%;
        margin: 0 auto;
      }
      .form-group {
        margin-bottom: 1.25rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
        font-size: 0.9rem;
      }
      input[type="text"], input[type="email"], select {
        width: 100%;
        padding: 0.6rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .error-box {
        background-color: #f8d7da;
        color: #721c24;
        padding: 0.75rem;
        border-radius: 4px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
      }
      .btn-submit {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
      }
      .btn-submit:hover {
        background-color: #0056b3;
      }
      .cancel-link {
        display: block;
        text-align: center;
        margin-top: 1rem;
        color: #6c757d;
        text-decoration: none;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2 style="text-align: center; margin-top: 0;">Edit User Profile</h2>
      
      {% if error %}
        <div class="error-box">{{ error }}</div>
      {% endif %}

      {% if user %}
        {% set form_pk = user['library_id'] or user['id'] or user['user_id'] or user['person_id'] %}
        <form action="{{ url_for('admin_edit_user', user_id=form_pk) }}" method="POST">
          
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{ user['username'] or user['Username'] or '' }}">
          </div>

          <div class="form-group">
            <label for="first_name">First Name</label>
            <input type="text" id="first_name" name="first_name" value="{{ user['first_name'] or user['First_name'] or '' }}">
          </div>

          <div class="form-group"> 
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" value="{{ user['last_name'] or user['Last_name'] or '' }}">
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" value="{{ user['email'] or user['Email'] or '' }}">
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" value="{{ user['address'] or user['Address'] or '' }}">
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" value="{{ user['city'] or user['City'] or '' }}">
          </div>

          <div class="form-group">
            <label for="zip_code">Zip Code</label>
            <input type="text" id="zip_code" name="zip_code" value="{{ user['zip_code'] or user['Zip_code'] or user['zipcode'] or '' }}">
          </div>

          <div class="form-group">
            <label for="role">System Role Tier</label>
            <select id="role" name="role">
              <option value="user" {% if user['role'] == 'user' or user['Role'] == 'user' %}selected{% endif %}>User</option>
              <option value="admin" {% if user['role'] == 'admin' or user['Role'] == 'admin' %}selected{% endif %}>Admin</option>
            </select>
          </div>

          <button type="submit" class="btn-submit">Save Profile Changes</button>
          <a href="{{ url_for('admin_view_users') }}" class="cancel-link">Cancel and Return</a>
        </form>
      {% else %}
        <p style="text-align: center; color: #dc3545;">User profile could not be verified by the system query.</p>
        <p style="text-align: center;"><a href="{{ url_for('admin_view_users') }}">Return to User List</a></p>
      {% endif %}
    </div>
  </body>
</html>
